name: Deploy to Farldo Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate text encoding did not get corrupted
        shell: pwsh
        run: ./scripts/check-corrupted-persian.ps1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            git -C /home/farldo.com/farldocom_git pull origin master
            rsync -avh --delete --exclude='.git' --exclude='.htaccess' /home/farldo.com/farldocom_git/ /home/farldo.com/public_html/
